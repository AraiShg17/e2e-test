<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E2E デモ — ボタンでモーダル</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, sans-serif;
        line-height: 1.6;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        text-align: center;
      }
      button {
        font-size: 1rem;
        padding: 0.6rem 1.2rem;
        border: none;
        border-radius: 0.5rem;
        background: #6366f1;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background: #4f46e5;
      }
      dialog#modal {
        border: none;
        border-radius: 0.75rem;
        padding: 2rem;
        max-width: 28rem;
        color: #0f172a;
      }
      dialog#modal::backdrop {
        background: rgba(15, 23, 42, 0.6);
      }
      .modal-actions {
        margin-top: 1.5rem;
        display: flex;
        justify-content: flex-end;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>ボタンを押すとモーダルが開きます</h1>
      <button id="open-modal" type="button">モーダルを開く</button>
    </main>

    <dialog id="modal" aria-labelledby="modal-title">
      <h2 id="modal-title">モーダルが開きました 🎉</h2>
      <p>これは E2E テストで検証されるモーダルです。</p>
      <div class="modal-actions">
        <button id="close-modal" type="button">閉じる</button>
      </div>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
