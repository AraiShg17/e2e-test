name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write # claude-code-action@v1 が OIDC トークンの発行に使う

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report (screenshots / video / trace)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      # 失敗時の録画を GIF 化して e2e-evidence ブランチに公開（コメント埋め込み用）
      - name: Publish failure GIFs
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/publish-evidence.sh

      # 結果を PR コメント + Actions の Summary に出す（artifact を DL しなくても確認できる）
      - name: Comment test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let passed = 0, failed = 0, flaky = 0, skipped = 0;
            const failedTests = [];
            try {
              const data = JSON.parse(fs.readFileSync('playwright-report/results.json', 'utf8'));
              const walk = (suites = []) => {
                for (const suite of suites) {
                  for (const spec of suite.specs || []) {
                    for (const t of spec.tests || []) {
                      if (t.status === 'expected') passed++;
                      else if (t.status === 'unexpected') { failed++; failedTests.push(spec.title); }
                      else if (t.status === 'flaky') flaky++;
                      else if (t.status === 'skipped') skipped++;
                    }
                  }
                  walk(suite.suites);
                }
              };
              walk(data.suites);
            } catch (e) {
              core.warning(`results.json の解析に失敗: ${e.message}`);
            }

            const ok = failed === 0;
            const header = ok
              ? '### ✅ E2E パス'
              : '### ❌ E2E 失敗';
            const counts = `🟢 ${passed} passed / 🔴 ${failed} failed / 🟡 ${flaky} flaky / ⚪ ${skipped} skipped`;
            const failList = failedTests.length
              ? '\n\n**失敗したテスト**\n' + failedTests.map(t => `- ${t}`).join('\n')
              : '';
            let gifMd = '';
            try { gifMd = fs.readFileSync('evidence-gifs.md', 'utf8').trim(); } catch {}

            const evidence = ok
              ? ''
              : `\n\n${gifMd ? gifMd + '\n\n' : ''}**さらに詳しく（スクショ / トレース）**\n[Artifacts: playwright-report をダウンロード](${runUrl}) → \`index.html\` を開く、または \`npx playwright show-trace <trace.zip>\` で再生できます。`;

            const marker = '<!-- e2e-report -->';
            const body = `${marker}\n${header}\n\n${counts}${failList}${evidence}\n\n<sub>[ワークフロー実行ログ](${runUrl})</sub>`;

            core.summary.addRaw(body).write();

            if (context.payload.pull_request) {
              const { owner, repo } = context.repo;
              const issue_number = context.payload.pull_request.number;
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            }

  auto-fix:
    name: Claude auto-fix on failure
    needs: e2e
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PR の head ブランチを checkout し、Claude が push できるようにする
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Let Claude diagnose and fix the failing E2E
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # github_token を明示的に渡すと Claude GitHub App のインストールが不要になり、
          # 標準の GITHUB_TOKEN で PR にコミット/push できる
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # automation モード: prompt を渡すと @claude メンション無しで実行される
          prompt: |
            この PR の Playwright E2E テストが失敗しています。これは Next.js (App Router)
            + TypeScript + CSS Modules のプロジェクトです。

            手順:
            1. `npm run test:e2e` を実行して失敗内容を確認する。
            2. 失敗の原因（「ボタンを押してもモーダルが開かない」など）を特定する。
               原因は基本的にアプリ側のコード `features/modal-demo/ModalDemo.tsx` や
               `app/` 配下にあります。テスト `tests/` は正しい仕様なので、テストを
               甘くして通すのは禁止です。
            3. `.claude/skills/` のフロントエンド規約（frontend-directory /
               frontend-html-css / frontend-native-ui など）に従ってアプリのコードを
               修正し、`npm run test:e2e` が全て緑になるまで繰り返す。
            4. 緑になったら、変更を分かりやすいメッセージでコミットし、この PR ブランチに push する。

            テストファイルは編集せず、必ずアプリのコードを直して直すこと。
          # claude_args はスペース区切りの CLI フラグ（複数行可）。
          # Claude 自身が git commit/push するため Bash を許可する。
          claude_args: |
            --model claude-opus-4-8
            --max-turns 30
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,Bash
