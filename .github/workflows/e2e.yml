name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  id-token: write # claude-code-action@v1 が OIDC→App token 交換に使う

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report (screenshots / video / trace)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      # 失敗 run: 失敗の録画を GIF 化
      - name: Publish failure GIF
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GIF_NAME: failure.gif
          URL_OUT: failure-url.txt
        run: bash scripts/publish-evidence.sh

      # 成功 run: 成功の録画を GIF 化（治った証拠）
      - name: Publish success GIF
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GIF_NAME: success.gif
          URL_OUT: success-url.txt
        run: bash scripts/publish-evidence.sh

      # 結果を PR コメントに集約。run をまたいで「失敗GIF」「成功GIF」を両方保持する。
      - name: Comment test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let passed = 0, failed = 0, flaky = 0, skipped = 0;
            const failedTests = [];
            try {
              const data = JSON.parse(fs.readFileSync('playwright-report/results.json', 'utf8'));
              const walk = (suites = []) => {
                for (const suite of suites) {
                  for (const spec of suite.specs || []) {
                    for (const t of spec.tests || []) {
                      if (t.status === 'expected') passed++;
                      else if (t.status === 'unexpected') { failed++; failedTests.push(spec.title); }
                      else if (t.status === 'flaky') flaky++;
                      else if (t.status === 'skipped') skipped++;
                    }
                  }
                  walk(suite.suites);
                }
              };
              walk(data.suites);
            } catch (e) {
              core.warning(`results.json の解析に失敗: ${e.message}`);
            }

            const read = (p) => { try { return fs.readFileSync(p, 'utf8').trim(); } catch { return ''; } };
            const failUrl = read('failure-url.txt');
            const successUrl = read('success-url.txt');

            const ok = failed === 0;
            const marker = '<!-- e2e-report -->';

            // 既存コメントから各ブロックを取り出すヘルパ
            const extract = (body, name) => {
              if (!body) return '';
              const m = body.match(new RegExp(`<!-- ${name}:START -->([\\s\\S]*?)<!-- ${name}:END -->`));
              return m ? m[1].trim() : '';
            };
            const wrap = (name, inner) => inner ? `<!-- ${name}:START -->\n${inner}\n<!-- ${name}:END -->` : '';

            // 既存コメント取得
            let existingBody = '';
            let existingId = null;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) { existingBody = existing.body; existingId = existing.id; }

            // 失敗ブロック: 今回失敗ならこの run の GIF、成功なら過去の失敗を引き継ぐ
            let failInner = extract(existingBody, 'fail');
            if (!ok && failUrl) {
              failInner = `**❌ 失敗時の様子（クリック不要で再生）**\n\n![モーダルが開かない様子](${failUrl})`;
            }
            // 成功ブロック: 今回成功ならこの run の GIF、失敗なら消す（今は壊れている）
            let successInner = extract(existingBody, 'success');
            if (ok) {
              if (successUrl) successInner = `**✅ 修正後（成功）の様子**\n\n![モーダルが開く様子](${successUrl})`;
            } else {
              successInner = '';
            }

            const header = ok ? '### ✅ E2E パス' : '### ❌ E2E 失敗';
            const counts = `🟢 ${passed} passed / 🔴 ${failed} failed / 🟡 ${flaky} flaky / ⚪ ${skipped} skipped`;
            const failList = failedTests.length
              ? '\n\n**失敗したテスト**\n' + failedTests.map(t => `- ${t}`).join('\n')
              : '';

            const parts = [marker, header, '', counts + failList];
            const fb = wrap('fail', failInner);
            const sb = wrap('success', successInner);
            if (fb) parts.push('', fb);
            if (sb) parts.push('', sb);
            parts.push('', `**さらに詳しく（スクショ / トレース）**\n[Artifacts: playwright-report をダウンロード](${runUrl}) → \`index.html\` を開く、または \`npx playwright show-trace <trace.zip>\``);
            parts.push('', `<sub>[ワークフロー実行ログ](${runUrl})</sub>`);
            const body = parts.join('\n');

            core.summary.addRaw(body).write();
            if (existingId) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existingId, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  auto-fix:
    name: Claude auto-fix on failure
    needs: e2e
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # push は Claude App token に委ねる（GITHUB_TOKEN の認証情報を残さない）
          persist-credentials: false

      # ループガード: 直近コミットが claude[bot] なら再修正しない（無限ループ防止）
      - name: Loop guard
        id: guard
        run: |
          author="$(git log -1 --format='%an')"
          echo "last commit author: $author"
          if echo "$author" | grep -qi 'claude'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.guard.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium

      - name: Let Claude diagnose and fix the failing E2E
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # github_token は渡さない → Claude GitHub App の token を使う。
          # App token のコミットは GITHUB_TOKEN と違い CI を再起動できる。
          use_commit_signing: true
          prompt: |
            この PR の Playwright E2E テストが失敗しています。これは Next.js (App Router)
            + TypeScript + CSS Modules のプロジェクトです。

            手順:
            1. `npm run test:e2e` を実行して失敗内容を確認する。
            2. 失敗の原因（「ボタンを押してもモーダルが開かない」など）を特定する。
               原因は基本的にアプリ側のコード `features/modal-demo/ModalDemo.tsx` や
               `app/` 配下にあります。テスト `tests/` は正しい仕様なので、テストを
               甘くして通すのは禁止です。
            3. `.claude/skills/` のフロントエンド規約（frontend-directory /
               frontend-html-css / frontend-native-ui など）に従ってアプリのコードを
               修正し、`npm run test:e2e` が全て緑になるまで繰り返す。
            4. 緑になったら、変更を分かりやすいメッセージでコミットし、この PR ブランチに push する。

            テストファイルは編集せず、必ずアプリのコードを直して直すこと。
          # claude_args はスペース区切りの CLI フラグ。
          # use_commit_signing=true のコミットは mcp__github_file_ops__commit_files で行うため許可必須。
          claude_args: |
            --model claude-opus-4-8
            --max-turns 30
            --allowedTools Edit,MultiEdit,Write,Read,Glob,Grep,Bash,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files

  review:
    name: Claude review (issue + rules)
    needs: e2e
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0 # origin/main との diff を取れるように

      - name: Claude reviews the PR against the issue and project rules
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # github_token は渡さない → Claude GitHub App として review/コメントを投稿
          # 自動修正は claude(bot) のコミットで再実行されるため、bot 起動を許可する
          allowed_bots: claude
          prompt: |
            この PR をレビューしてください。これは Next.js (App Router) + TypeScript +
            CSS Modules のプロジェクトです（issue #2「モーダル機能の要件」に対応）。

            ## issue #2 の受け入れ条件
            - 初期状態ではモーダルは非表示
            - ボタンでモーダルが開く / 見出し「モーダルが開きました 🎉」表示 / 閉じるボタンで閉じる
            - アクセシブル（`<dialog>` + `showModal()` / フォーカス管理 / `aria-labelledby`）
            - `.claude/skills/` のルール準拠（App Router の責務分離 / CSS Modules / ネイティブ `<dialog>`）

            ## やること
            1. `git diff origin/main...HEAD` で差分を把握する。
            2. 上記 issue 要件と `.claude/skills/`（frontend-directory / frontend-html-css /
               frontend-native-ui / frontend-a11y-security 等）に照らしてレビューする。
            3. 改善できる箇所があれば、`mcp__github_inline_comment__create_inline_comment` で
               該当ファイル・行に**インラインコメント**を付ける。具体的なコード変更は本文に
               GitHub の ```suggestion ブロックを含め、「Apply suggestion」で1クリック適用
               できる形にする。
            4. 最後に要約コメントを残す。問題が無ければその旨を明記する。

            重要: **ファイルの変更・コミット・push は一切しない（レビューのみ）**。
          claude_args: |
            --model claude-opus-4-8
            --max-turns 25
            --allowedTools Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),mcp__github_inline_comment__create_inline_comment,mcp__github_comment__update_claude_comment
